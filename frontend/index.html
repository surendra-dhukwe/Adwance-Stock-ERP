<!DOCTYPE html>
<html>

<head>

<title>Stock ERP Login</title>

<link rel="stylesheet" href="css/style.css">

<style>
/* ================= GLOBAL RESET ================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Segoe UI,Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:radial-gradient(circle at top left,#1f2a44,#0f172a);

color:white;
}


/* ================= LOGIN BOX ================= */

.login-box{

width:350px;
padding:35px;

background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);

border-radius:10px;

box-shadow:0 10px 30px rgba(0,0,0,0.4);

text-align:center;

animation:fadeIn .6s ease;
}


/* ================= TITLE ================= */

.login-box h2{

margin-bottom:25px;
font-weight:600;
letter-spacing:1px;

}


/* ================= INPUTS ================= */

.login-box input{

width:100%;
padding:12px;

margin-bottom:15px;

border:none;
outline:none;

border-radius:6px;

background:rgba(255,255,255,0.12);

color:white;

font-size:14px;

transition:0.3s;

}

.login-box input::placeholder{

color:#ddd;

}

.login-box input:focus{

background:rgba(255,255,255,0.2);
transform:scale(1.02);

}


/* ================= CAPTCHA BOX ================= */

.captcha-box{

display:flex;
gap:10px;
margin-bottom:15px;

}

#captchaText{

flex:1;

background:#111827;

padding:10px;

border-radius:6px;

font-weight:bold;

letter-spacing:3px;

display:flex;
align-items:center;
justify-content:center;

}


/* ================= REFRESH BUTTON ================= */

.refreshBtn{

background:#2563eb;

border:none;

border-radius:6px;

color:white;

font-size:16px;

cursor:pointer;

padding:10px 15px;

transition:0.3s;

}

.refreshBtn:hover{

background:#1d4ed8;
transform:rotate(180deg);

}


/* ================= LOGIN BUTTON ================= */

.loginBtn{

width:100%;

padding:12px;

border:none;

border-radius:6px;

background:#22c55e;

color:white;

font-size:15px;

font-weight:600;

cursor:pointer;

transition:0.3s;

}

.loginBtn:hover{

background:#16a34a;
transform:scale(1.03);

}


/* ================= ANIMATION ================= */

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>

</head>

<body>

<div class="login-box">

<h2>Stock ERP Login</h2>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">


<!-- CAPTCHA SHOW -->

<div class="captcha-box">

<div id="captchaText"></div>

<button onclick="generateCaptcha()" class="refreshBtn">
↻
</button>

</div>


<input type="text" id="captchaInput" placeholder="Enter Captcha">


<button onclick="login()" class="loginBtn">
Login
</button>

</div>


<script>

/* ================= CAPTCHA GENERATE ================= */

let captcha="";

function generateCaptcha(){

const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";

captcha="";

for(let i=0;i<5;i++){

captcha+=chars.charAt(
Math.floor(Math.random()*chars.length)
);

}

document.getElementById("captchaText").innerText=captcha;

}


/* PAGE LOAD CAPTCHA */

generateCaptcha();



/* ================= LOGIN FUNCTION ================= */

function login(){

const username=document.getElementById("username").value;

const password=document.getElementById("password").value;

const captchaInput=document.getElementById("captchaInput").value;


/* CAPTCHA CHECK */

if(captchaInput !== captcha){

alert("Captcha Incorrect");

generateCaptcha();

return;

}


/* USERNAME PASSWORD CHECK */

if(username==="Admin" && password==="Admin@123"){

alert("Login Successful");

window.location="dashboard.html";

}

else{

alert("Invalid Username or Password");

}

}

</script>

</body>

</html>
