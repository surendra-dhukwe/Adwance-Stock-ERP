<!DOCTYPE html>
<html>

<head>

<title>Stock 2 Receive</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<h2>Stock 2 Receive</h2>

<!-- DATE SELECTOR ADDED -->
<div class="date-box">

<label for="receiveDate">Select Date:</label>
<input type="date" id="receiveDate" value="<?php echo date('Y-m-d'); ?>">

</div>


<input type="text" id="party" placeholder="Party Name">

<input type="text" id="invoice" placeholder="Invoice Number">

<textarea id="note" placeholder="Note"></textarea>

<button onclick="addRow()" class="insertRowBtn">
Insert Row
</button>

<table id="itemTable">

<thead>

<tr>

<th>Code</th>
<th>Name</th>
<th>Bags</th>
<th>Quantity</th>
<th>Total Quantity</th>

</tr>

</thead>

<tbody></tbody>

</table>

<button onclick="saveTransaction()">DONE</button>

<script>

    // ================= CURRENT DATE AUTOSET =================
window.addEventListener("DOMContentLoaded", () => {
    const dateInput = document.getElementById("receiveDate");

    if (dateInput) {
        // Get today's date in YYYY-MM-DD format
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, "0"); // month is 0-indexed
        const dd = String(today.getDate()).padStart(2, "0");
        const currentDate = `${yyyy}-${mm}-${dd}`;

        // Set input value to today
        dateInput.value = currentDate;

        // Optional: store selected date globally or in localStorage
        dateInput.addEventListener("change", (e) => {
            console.log("Selected Date:", e.target.value);
            // You can store this date for later use
            localStorage.setItem("selectedDate", e.target.value);
        });
    }
});

function addRow(){

const table=document.querySelector("#itemTable tbody");

const row=table.insertRow();

row.innerHTML=`

<td><input></td>
<td><input></td>
<td><input type="number"></td>
<td><input type="number"></td>
<td class="total">0</td>

`;

row.querySelectorAll("input").forEach(input=>{
input.addEventListener("input",calculateRow);
});

}



function calculateRow(e){

const row=e.target.closest("tr");

const bags=row.cells[2].querySelector("input").value || 0;

const qty=row.cells[3].querySelector("input").value || 0;

row.querySelector(".total").innerText=bags*qty;

}



function saveTransaction(){

const rows=document.querySelectorAll("#itemTable tbody tr");

let data=[];

rows.forEach(r=>{

data.push({

code:r.cells[0].querySelector("input").value,
name:r.cells[1].querySelector("input").value,
totalQty:r.querySelector(".total").innerText

});

});

fetch("http://localhost:3000/transactions/stock2",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

type:"receive",
items:data

})

})

.then(res=>res.json())

.then(()=>{

alert("Stock2 Receive Saved");

location.reload();

});

}

</script>

</body>

</html>
