<!DOCTYPE html>
<html>

<head>

<title>Stock Transactions Report</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<h2>Stock Transactions Report</h2>


<!-- STOCK SELECT -->

<div class="stockSelect">

<label>Select Stock :</label>

<select id="stockSelect" onchange="loadTransactions()">

<option value="stock1">Stock 1</option>

<option value="stock2">Stock 2</option>

</select>

</div>



<!-- SEARCH -->

<div class="searchBox">

<input
type="text"
id="searchInput"
placeholder="Search Code, Name, Type or Date"
onkeyup="filterTable()">

</div>



<!-- TABLE -->

<table id="reportTable">

<thead>

<tr>

<th onclick="sortTable(0)">Code</th>
<th onclick="sortTable(1)">Name</th>
<th onclick="sortTable(2)">Quantity</th>
<th onclick="sortTable(3)">Type</th>
<th onclick="sortTable(4)">Date</th>

</tr>

</thead>

<tbody>

</tbody>

</table>



<script>

let allData=[];


/* ================= LOAD TRANSACTIONS ================= */

function loadTransactions(){

const stock=document.getElementById("stockSelect").value;

fetch(`http://localhost:3000/all-transactions/${stock}`)

.then(res=>{

if(!res.ok){

throw new Error("Server Error");

}

return res.json();

})

.then(data=>{

allData=data;

showTable(data);

})

.catch(err=>{

console.log(err);

alert("Server Not Running or API Error");

});

}



/* ================= SHOW TABLE ================= */

function showTable(data){

const table=document.querySelector("#reportTable tbody");

table.innerHTML="";


if(data.length===0){

table.innerHTML=`<tr>

<td colspan="5">No Transactions Found</td>

</tr>`;

return;

}


data.forEach(item=>{

const row=table.insertRow();

row.innerHTML=`

<td>${item.code}</td>

<td>${item.name}</td>

<td>${item.total_quantity}</td>

<td class="${item.type=='dispatch'?'dispatch':'receive'}">

${item.type}

</td>

<td>

${new Date(item.entry_date).toLocaleString()}

</td>

`;

});

}



/* ================= SEARCH ================= */

function filterTable(){

const text=document.getElementById("searchInput").value.toLowerCase();

const filtered=allData.filter(item =>

item.code.toLowerCase().includes(text) ||

item.name.toLowerCase().includes(text) ||

item.type.toLowerCase().includes(text) ||

item.total_quantity.toString().includes(text) ||

new Date(item.entry_date).toLocaleString().toLowerCase().includes(text)

);

showTable(filtered);

}



/* ================= SORT ================= */

function sortTable(n){

const rows=Array.from(document.querySelectorAll("#reportTable tbody tr"));

rows.sort((a,b)=>{

let x=a.cells[n].innerText;

let y=b.cells[n].innerText;

return x.localeCompare(y,undefined,{numeric:true});

});

const tbody=document.querySelector("#reportTable tbody");

tbody.innerHTML="";

rows.forEach(r=>tbody.appendChild(r));

}



/* ================= PAGE LOAD ================= */

window.onload=loadTransactions;

</script>

</body>

</html>
