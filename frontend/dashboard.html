<!DOCTYPE html>
<html>

<head>

<title>Stock ERP Dashboard</title>

<link rel="stylesheet" href="css/style.css">

<style>

/* BODY */

body{
margin:0;
font-family:Segoe UI,Arial;
background:radial-gradient(circle at top left,#1f2a44,#0f172a);
color:white;
}

/* TOP BAR */

.topbar{
height:55px;
background:#111827;
display:flex;
align-items:center;
padding:0 15px;
}

.menu-btn{
font-size:22px;
cursor:pointer;
margin-right:15px;
}

/* LAYOUT */

.container{
display:flex;
}

/* SIDEBAR */

.sidebar{
width:230px;
background:#111827;
min-height:100vh;
padding:20px;
transition:0.3s;
}

.sidebar.hide{
margin-left:-230px;
}

.sidebar h3{
margin-bottom:25px;
}

/* SIDEBAR BUTTON */

.sidebar button{
width:100%;
padding:10px;
margin:6px 0;
border:none;
background:#374151;
color:white;
cursor:pointer;
border-radius:6px;
font-size:14px;
text-align:left;
}

.sidebar button:hover{
background:#4b5563;
}

/* SUB MENU */

.submenu{
display:none;
padding-left:12px;
}

/* MAIN */

.main{
flex:1;
padding:25px;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:rgba(255,255,255,0.15);
padding:30px;
border-radius:15px;
text-align:center;
backdrop-filter:blur(10px);
}

.card button{
margin-top:10px;
padding:8px 14px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
}

.card button:hover{
background:#1e40af;
}

</style>

</head>

<body>

<!-- TOP BAR -->

<div class="topbar">

<span class="menu-btn" onclick="toggleMenu()">☰</span>

<h3>Stock ERP Dashboard</h3>

</div>

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<h3>Stock ERP</h3>

<button onclick="openPage('dashboard.html')">
Dashboard
</button>

<!-- STOCK MENU -->

<button onclick="toggleStockMenu()">
Stock ▼
</button>

<div id="stockMenu" class="submenu">

<button onclick="openPage('stock1.html')">
Stock 1
</button>

<button onclick="openPage('stock2.html')">
Stock 2
</button>

</div>

<button onclick="openPage('products.html')">
Products
</button>

<button onclick="openPage('stock-report.html')">
Stock Report
</button>

<!-- DOWNLOAD MENU -->

<button onclick="toggleDownloadMenu()">
Download ▼
</button>

<div id="downloadMenu" class="submenu">

<button onclick="downloadStock('stock1')">
Download Stock 1
</button>

<button onclick="downloadStock('stock2')">
Download Stock 2
</button>

</div>

<button onclick="logout()">
Logout
</button>

</div>

<!-- MAIN -->

<div class="main">

<h2>Dashboard</h2>

<div class="cards">

<div class="card">
<h3>Stock 1</h3>
<p>Dispatch / Receive</p>
<button onclick="openPage('stock1.html')">Open</button>
</div>

<div class="card">
<h3>Stock 2</h3>
<p>Dispatch / Receive</p>
<button onclick="openPage('stock2.html')">Open</button>
</div>

<div class="card">
<h3>Products</h3>
<p>Manage Products</p>
<button onclick="openPage('products.html')">Open</button>
</div>

<div class="card">
<h3>Reports</h3>
<p>View Transactions</p>
<button onclick="openPage('stock-report.html')">Open</button>
</div>

<div class="card">
<h3>Download Stock</h3>
<p>Download Final Stock</p>
<button onclick="downloadStock('stock1')">Stock 1</button>
<button onclick="downloadStock('stock2')">Stock 2</button>
</div>

</div>

</div>

</div>

<script>

/* SIDEBAR TOGGLE */

function toggleMenu(){
document.getElementById("sidebar").classList.toggle("hide")
}

/* STOCK MENU */

function toggleStockMenu(){
let menu=document.getElementById("stockMenu")
menu.style.display = (menu.style.display==="block")?"none":"block"
}

/* DOWNLOAD MENU */

function toggleDownloadMenu(){
let menu=document.getElementById("downloadMenu")
menu.style.display = (menu.style.display==="block")?"none":"block"
}

/* OPEN PAGE */

function openPage(page){
window.location=page
}

/* LOGOUT */

function logout(){
if(confirm("Logout ?")){
window.location="index.html"
}
}

/* DOWNLOAD STOCK */

function downloadStock(stock){

fetch(`http://localhost:3000/final-stock/${stock}/download`)
.then(res=>res.blob())
.then(blob=>{

const url=URL.createObjectURL(blob)

const a=document.createElement("a")

a.href=url
a.download=`${stock}_final_stock.csv`
a.click()

})

}

</script>

</body>
</html>
