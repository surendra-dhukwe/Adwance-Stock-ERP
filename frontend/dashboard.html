<!DOCTYPE html>
<html>
<head>

<title>Stock ERP Dashboard</title>

<link rel="stylesheet" href="css/style.css">

<style>

/* DASHBOARD LAYOUT */

.container{

display:flex;

height:100vh;

}


/* SIDEBAR */

.sidebar{

width:230px;

background:#111827;

color:white;

padding:20px;

}

.sidebar h3{

margin-bottom:30px;

}

.sidebar button{

width:100%;

margin:10px 0;

background:#374151;

}

.sidebar button:hover{

background:#4b5563;

}


/* MAIN */

.main{

flex:1;

padding:30px;

color:white;

}


/* CARDS */

.cards{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(200px,1fr));

gap:20px;

margin-top:30px;

}

.card{

background:rgba(255,255,255,0.15);

padding:30px;

border-radius:15px;

text-align:center;

backdrop-filter:blur(10px);

}

.card h3{

margin-bottom:10px;

}

</style>

</head>

<body>

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<h3>Stock ERP</h3>

<button onclick="openPage('stock1.html')">
Stock 1
</button>

<button onclick="openPage('stock2.html')">
Stock 2
</button>

<button onclick="openPage('products.html')">
Products
</button>

<button onclick="openPage('stock-report.html')">
Stock Report
</button>

<button onclick="logout()">
Logout
</button>

</div>


<!-- MAIN -->

<div class="main">

<h2>Dashboard</h2>

<div class="cards">

<div class="card">

<h3>Stock 1</h3>

<p>Dispatch / Receive</p>

<button onclick="openPage('stock1.html')">
Open
</button>

</div>


<div class="card">

<h3>Stock 2</h3>

<p>Dispatch / Receive</p>

<button onclick="openPage('stock2.html')">
Open
</button>

</div>


<div class="card">

<h3>Products</h3>

<p>Manage Products</p>

<button onclick="openPage('products.html')">
Open
</button>

</div>


<div class="card">

<h3>Reports</h3>

<p>View Transactions</p>

<button onclick="openPage('stock-report.html')">
Open
</button>

</div>

</div>

</div>

</div>


<script>

function openPage(page){

window.location=page;

}

function logout(){

if(confirm("Logout?")){

window.location="index.html";

}

}

</script>

</body>

</html>
