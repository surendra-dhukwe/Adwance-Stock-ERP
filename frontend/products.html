<!DOCTYPE html>
<html>

<head>

<title id="productsPageTitle">Products List</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body id="productsPage" class="products-page">

<h2 id="productsHeading" class="page-heading">Products List</h2>


<!-- STOCK SELECT -->

<div class="stockSelect" id="stockSelectBox">

<label id="stockLabel">Select Stock :</label>

<select id="stockSelect" class="stock-dropdown" onchange="loadProducts()">

<option value="stock1" class="stock-option">Stock 1</option>

<option value="stock2" class="stock-option">Stock 2</option>

</select>

</div>



<!-- ADD ITEM -->

<div class="addBox" id="addProductBox">

<h3 id="addItemHeading" class="section-title">Add Item</h3>

<input id="code" class="input-code" placeholder="Code">

<input id="name" class="input-name" placeholder="Name">

<button id="addItemBtn" class="addItemBtn add-product-btn" onclick="addProduct()">
Add Item
</button>

</div>



<!-- SEARCH -->

<div class="searchBox" id="searchBox">

<input
id="search"
class="search-input"
placeholder="Search Code or Name"
onkeyup="searchProduct()"
>

</div>



<!-- TABLE -->

<table id="table" class="products-table">

<thead id="productsTableHead">

<tr class="table-header-row">

<th id="thCode" class="table-header">Code</th>

<th id="thName" class="table-header">Name</th>

<th id="thStock" class="table-header">Stock</th>

</tr>

</thead>

<tbody id="productsTableBody">

</tbody>

</table>



<script id="productsScript">


let allProducts=[];



/* ================= LOAD PRODUCTS ================= */

function loadProducts(){

const stock=document.getElementById("stockSelect").value;

fetch(`http://localhost:3000/products-stock/${stock}`)

.then(res=>res.json())

.then(data=>{

allProducts=data;

showTable(data);

})

.catch(err=>{

alert("Server Not Running");

});

}



/* ================= SHOW TABLE ================= */

function showTable(data){

const table=document.querySelector("#table tbody");

table.innerHTML="";


data.forEach(p=>{

const row=table.insertRow();

row.className="product-row";

row.innerHTML=`

<td class="product-code">${p.code}</td>

<td class="product-name">${p.name}</td>

<td class="product-stock ${p.stock>=0?'stockGreen':'stockRed'}">

${p.stock}

</td>

`;

});

}



/* ================= SEARCH ================= */

function searchProduct(){

const text=document.getElementById("search").value.toLowerCase();


const filtered=allProducts.filter(p=>

p.code.toLowerCase().includes(text)

||

p.name.toLowerCase().includes(text)

);


showTable(filtered);

}



/* ================= ADD PRODUCT ================= */

function addProduct(){

const code=document.getElementById("code").value;

const name=document.getElementById("name").value;


fetch("http://localhost:3000/products",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

code:code,
name:name

})

})

.then(res=>res.json())

.then(()=>{

alert("Product Added");

loadProducts();

});

}



/* ================= PAGE LOAD ================= */

loadProducts();


</script>

</body>

</html>
