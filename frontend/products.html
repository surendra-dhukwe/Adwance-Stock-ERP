<!DOCTYPE html>
<html>
<head>
<title>Products Manager</title>

<style>
body{
    font-family:Segoe UI;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    padding:20px;
}

/* HEADING */
h2{
    text-align:center;
    margin-bottom:20px;
    letter-spacing:1px;
}

/* BOX */
.box{
    background:rgba(30,41,59,0.9);
    padding:15px;
    border-radius:12px;
    margin-bottom:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

/* MENU */
.menu{
    text-align:center;
    position:relative;
}

.menu button{
    background:#2563eb;
    padding:10px 18px;
    border:none;
    border-radius:8px;
    color:white;
    cursor:pointer;
    font-weight:600;
    transition:0.3s;
}

.menu button:hover{
    background:#1e40af;
    transform:scale(1.05);
}

/* DROPDOWN */
.menu-options{
    display:none;
    margin-top:12px;
    animation:fadeIn 0.3s ease;
}

.menu-options button{
    margin:5px;
    padding:6px 12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    color:white;
}

.add{background:#22c55e;}
.update{background:#f59e0b;}
.delete{background:#ef4444;}

.menu-options button:hover{
    opacity:0.8;
}

/* FORM */
.formBox{
    display:none;
    margin-top:10px;
    animation:fadeIn 0.3s ease;
}

/* INPUT */
input{
    padding:8px 10px;
    margin:5px;
    border:none;
    border-radius:6px;
    outline:none;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
}
th,td{
    padding:10px;
}
th{
    background:#334155;
}
tr:nth-child(even){
    background:#1e293b;
}
tr:hover{
    background:#334155;
}

/* SEARCH */
.searchBox{
    text-align:center;
}
.searchBox input{
    width:300px;
}

/* ANIMATION */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}
</style>

</head>

<body>

<h2>Products Manager</h2>

<!-- MENU -->
<div class="box menu">
<button onclick="toggleMenu()">⚙ Manage Products</button>

<div id="menuOptions" class="menu-options">

    <button class="add" onclick="showForm('addForm')">Add</button>
    <button class="update" onclick="showForm('updateForm')">Update</button>
    <button class="delete" onclick="showForm('deleteForm')">Delete</button>

    <!-- ADD -->
    <div id="addForm" class="formBox">
        <input id="add_code" placeholder="CPP Code">
        <input id="add_name" placeholder="Name">
        <input id="add_loose" placeholder="Loose Code">
        <button class="add" onclick="addProduct()">Add Product</button>
    </div>

    <!-- UPDATE -->
    <div id="updateForm" class="formBox">
        <input id="up_code" placeholder="CPP Code">
        <input id="up_name" placeholder="New Name">
        <input id="up_loose" placeholder="New Loose Code">
        <button class="update" onclick="updateProduct()">Update Product</button>
    </div>

    <!-- DELETE -->
    <div id="deleteForm" class="formBox">
        <input id="del_code" placeholder="CPP Code">
        <button class="delete" onclick="deleteProduct()">Delete Product</button>
    </div>

</div>
</div>

<!-- SEARCH -->
<div class="box searchBox">
<h3>Search Product</h3>
<input id="searchInput" placeholder="Search Code / Name / Loose Code" onkeyup="filterProducts()">
</div>

<!-- TABLE -->
<div class="box">
<h3>All Products</h3>
<table>
<thead>
<tr>
<th>CPP Code</th>
<th>Name</th>
<th>Loose Code</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

<script>

let allProducts=[];

/* MENU TOGGLE */
function toggleMenu(){
    const menu=document.getElementById("menuOptions");

    if(menu.style.display==="block"){
        menu.style.display="none";
        hideAllForms(); // 🔥 important fix
    } else {
        menu.style.display="block";
    }
}

/* SHOW FORM */
function showForm(id){
    hideAllForms();
    document.getElementById(id).style.display="block";
}

/* HIDE ALL FORMS */
function hideAllForms(){
    document.querySelectorAll(".formBox").forEach(f=>f.style.display="none");
}

/* CLICK OUTSIDE CLOSE */
document.addEventListener("click", function(e){
    const menu=document.getElementById("menuOptions");
    const button=document.querySelector(".menu button");

    if(!menu.contains(e.target) && !button.contains(e.target)){
        menu.style.display="none";
        hideAllForms(); // 🔥 fix
    }
});

/* LOAD */
function loadProducts(){
    fetch("http://localhost:3000/products")
    .then(res=>res.json())
    .then(data=>{
        allProducts=data;
        showTable(data);
    });
}

/* SHOW TABLE */
function showTable(data){
    const table=document.getElementById("table");
    table.innerHTML="";

    if(data.length===0){
        table.innerHTML=`<tr><td colspan="3">No Data</td></tr>`;
        return;
    }

    data.forEach(p=>{
        table.innerHTML+=`
        <tr>
            <td>${p.code || ""}</td>
            <td>${p.name}</td>
            <td>${p.loose_code || ""}</td>
        </tr>`;
    });
}

/* SEARCH */
function filterProducts(){
    const text=document.getElementById("searchInput").value.toLowerCase();

    const filtered=allProducts.filter(p =>
        (p.code || "").toLowerCase().includes(text) ||
        (p.name || "").toLowerCase().includes(text) ||
        (p.loose_code || "").toLowerCase().includes(text)
    );

    showTable(filtered);
}

/* ADD */
function addProduct(){
    const code=document.getElementById("add_code").value.trim();
    const name=document.getElementById("add_name").value.trim();
    const loose_code=document.getElementById("add_loose").value.trim();

    if(!name){ alert("Name required"); return; }

    fetch("http://localhost:3000/products",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({code,name,loose_code})
    })
    .then(()=>{ alert("Added"); loadProducts(); });
}

/* UPDATE */
function updateProduct(){
    const cpp_code=document.getElementById("up_code").value.trim();
    const name=document.getElementById("up_name").value.trim();
    const loose_code=document.getElementById("up_loose").value.trim();

    if(!cpp_code){ alert("Enter Code"); return; }

    fetch("http://localhost:3000/products",{
        method:"PUT",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({cpp_code,name,loose_code})
    })
    .then(()=>{ alert("Updated"); loadProducts(); });
}

/* DELETE */
function deleteProduct(){
    const cpp_code=document.getElementById("del_code").value.trim();

    if(!cpp_code){ alert("Enter Code"); return; }
    if(!confirm("Delete?")) return;

    fetch(`http://localhost:3000/products/${cpp_code}`,{
        method:"DELETE"
    })
    .then(()=>{ alert("Deleted"); loadProducts(); });
}

/* INIT */
loadProducts();

</script>

</body>
</html>
